<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технічна підтримка</title>
    <style>
        :root {
            --primary-blue: #005AEE;
            --primary-blue-hover: #0045B8;
            --bg-white: #FFFFFF;
            --text-dark: #111827;
            --text-light: #6B7280;
            --border-color: #E5E7EB;
            --input-bg: #F9FAFB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #F3F4F6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            background-color: var(--bg-white);
            width: 100%;
            max-width: 400px;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
        }

        @media (min-width: 401px) {
            .app-container {
                min-height: 800px;
                border-radius: 24px;
            }
        }

        /* Сповіщення (Toast) */
        .toast {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: white;
            padding: 14px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 4px solid var(--primary-blue);
            width: max-content;
            font-size: 14px;
            font-weight: 500;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        h1 { font-size: 26px; font-weight: 700; color: var(--text-dark); margin-bottom: 12px; }
        p.subtitle { color: var(--text-light); font-size: 15px; margin-bottom: 24px; line-height: 1.5; }

        /* Контакти */
        .contact-methods {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .contact-link {
            display: flex;
            align-items: center;
            padding: 14px;
            background: var(--input-bg);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 15px;
            transition: 0.2s;
            border: 1px solid var(--border-color);
        }

        .contact-link:active { transform: scale(0.98); background: #f0f2f5; }

        .contact-icon { margin-right: 12px; font-size: 20px; }

        /* Форма */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px; }
        
        .form-group input, .form-group textarea { 
            width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--border-color); 
            background-color: var(--input-bg); font-size: 16px; transition: 0.2s; resize: none;
        }
        
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary-blue); background: white; }

        .char-count { text-align: right; font-size: 11px; color: var(--text-light); margin-top: 4px; }

        .btn { 
            width: 100%; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600; 
            cursor: pointer; border: none; transition: 0.2s; background: var(--primary-blue); color: white;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .back-btn {
            background: none; border: none; color: var(--text-light); font-size: 14px; font-weight: 500;
            display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 20px; width: fit-content;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="toast" class="toast">Тікет відправлено!</div>

        <button class="back-btn" onclick="location.href='vitalik.html'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Назад
        </button>

        <h1>Тех. підтримка</h1>
        <p class="subtitle">Виникли запитання чи проблеми? Ми завжди на зв'язку. Оберіть зручний спосіб або напишіть нам тут.</p>

        <div class="contact-methods">
            <a href="https://t.me/volodumur_zelenskyi" class="contact-link">
                <span class="contact-icon">✈️</span> Telegram: @volodumur_zelenskyi
            </a>
            <a href="tel:+380684747924" class="contact-link">
                <span class="contact-icon">📞</span> +380 68 474 79 24
            </a>
        </div>

        <hr style="border: none; border-top: 1px solid var(--border-color); margin-bottom: 24px;">

        <form id="support-form">
            <div class="form-group">
                <label>Заголовок форми</label>
                <input type="text" id="ticket-subject" maxlength="90" placeholder="Коротко про проблему..." required>
                <div class="char-count" id="subject-count">0 / 90</div>
            </div>

            <div class="form-group">
                <label>Текст звернення</label>
                <textarea id="ticket-text" rows="5" maxlength="500" placeholder="Опишіть деталі вашого запиту..." required></textarea>
                <div class="char-count" id="text-count">0 / 500</div>
            </div>

            <button type="submit" id="submit-btn" class="btn">Відправити</button>
        </form>
    </div>

    <script>
        const subjectInput = document.getElementById('ticket-subject');
        const textInput = document.getElementById('ticket-text');
        const subjectCount = document.getElementById('subject-count');
        const textCount = document.getElementById('text-count');

        // Оновлення лічильників символів
        subjectInput.addEventListener('input', () => {
            subjectCount.innerText = `${subjectInput.value.length} / 90`;
        });

        textInput.addEventListener('input', () => {
            textCount.innerText = `${textInput.value.length} / 500`;
        });

        // Відправка форми
        document.getElementById('support-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const subject = subjectInput.value;
            const messageText = textInput.value;

            // ДАНІ ТЕЛЕГРАМ
            const BOT_TOKEN = "8772032690:AAEa4MUdtUmiwEOPAIwpkkow9_I7-eudNrU";
            const CHAT_ID = "2106920885"; // <--- ВСТАВ СВІЙ ID ТУТ ЯКЩО ЦЕЙ НЕ ВІРНИЙ

            // Форматування тексту для бота
            const fullMessage = `Новий тікет!\n\nЗаголовок: ${subject}\n\nТекст: ${messageText}\n\ntelegram клієнта: @Vitalik_3331`;

            btn.disabled = true;
            btn.innerText = "Відправка...";

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: fullMessage
                    })
                });

                if (response.ok) {
                    const toast = document.getElementById('toast');
                    toast.classList.add('show');

                    setTimeout(() => {
                        location.href = 'vitalik.html';
                    }, 2000);
                } else {
                    alert('Помилка при відправці. Перевірте підключення або ID.');
                    btn.disabled = false;
                    btn.innerText = "Відправити";
                }
            } catch (error) {
                alert('Не вдалося зв’язатися з сервером Telegram.');
                btn.disabled = false;
                btn.innerText = "Відправити";
            }
        });
    </script>
</body>
</html>
