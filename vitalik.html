<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikles - Головна</title>
    <style>
        :root {
            --primary-blue: #005AEE;
            --primary-blue-hover: #0045B8;
            --bg-white: #FFFFFF;
            --text-dark: #111827;
            --text-light: #6B7280;
            --border-color: #E5E7EB;
            --input-bg: #F9FAFB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #F3F4F6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Контейнер додатка */
        .app-container {
            background-color: var(--bg-white);
            width: 100%;
            max-width: 400px;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        @media (min-width: 401px) {
            .app-container {
                min-height: 800px;
                border-radius: 24px;
                margin: 20px 0;
                overflow: hidden;
            }
        }

        /* Фіксований заголовок */
        header {
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -0.5px;
        }

        /* Кнопка профілю (Пончик) */
        .profile-trigger {
            width: 42px;
            height: 42px;
            background-color: var(--input-bg);
            border: 2px solid var(--primary-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s ease;
        }

        .profile-trigger:active {
            transform: scale(0.9);
        }

        /* Іконка надкушеного пончика через SVG */
        .donut-icon {
            width: 24px;
            height: 24px;
            color: var(--primary-blue);
        }

        /* Меню профілю (Overlay) */
        .profile-menu {
            position: absolute;
            top: 70px;
            right: 16px;
            width: 280px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            padding: 24px;
            display: none;
            z-index: 101;
            border: 1px solid var(--border-color);
            animation: slideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .profile-menu.active {
            display: block;
        }

        .profile-info-item {
            margin-bottom: 16px;
        }

        .profile-info-item label {
            display: block;
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .profile-info-item span {
            font-weight: 600;
            color: var(--text-dark);
            word-break: break-all;
        }

        .forgot-pass {
            display: inline-block;
            margin-top: 8px;
            color: var(--primary-blue);
            text-decoration: underline;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-support {
            margin-top: 24px;
            width: 100%;
            padding: 12px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Контент з кнопками */
        .content {
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .category-card {
            background-color: var(--bg-white);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .category-card:active {
            transform: scale(0.97);
            background-color: var(--input-bg);
        }

        .category-card::after {
            content: '→';
            position: absolute;
            right: 24px;
            font-size: 20px;
            color: var(--primary-blue);
            opacity: 0.5;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background-color: #eff6ff;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 16px;
            font-size: 24px;
        }

        .card-text {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* Скриття меню при кліку поза ним */
        .overlay-close {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 99;
            display: none;
        }
    </style>
</head>
<body>

    <div id="click-outside" class="overlay-close" onclick="toggleProfile()"></div>

    <div class="app-container">
        <header>
            <div class="logo">Pikles</div>
            <div class="profile-trigger" onclick="toggleProfile()">
                <svg class="donut-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 1 1-9-9c4.97 0 9 4.03 9 9Z"/>
                    <path d="M16 3.5a3 3 0 0 0-3 3c0 1.66 1.34 3 3 3s3-1.34 3-3c0-1.66-1.34-3-3-3Z" fill="white" stroke="none"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </div>

            <div id="profileMenu" class="profile-menu">
                <div class="profile-info-item">
                    <label>Ім'я</label>
                    <span id="user-name">Гість</span>
                </div>
                <div class="profile-info-item">
                    <label>Електрона скринька</label>
                    <span id="user-email">не вказано</span>
                </div>
                
                <a href="password.html" class="forgot-pass">Забули пароль?</a>

                <button class="btn-support" onclick="location.href='help.html'">
                    Зв'язок з тех.підтримкою
                </button>
            </div>
        </header>

        <div class="content">
            
            <a href="poslugy/rozrobra.html" class="category-card">
                <div class="card-icon">💻</div>
                <div class="card-text">Послуги розробки</div>
            </a>

            <a href="poslugy/footboal.html" class="category-card">
                <div class="card-icon">⚽</div>
                <div class="card-text">Послуги футболу</div>
            </a>

            <a href="poslugy/nakrutka.html" class="category-card">
                <div class="card-icon">🚀</div>
                <div class="card-text">Послуги накрутки</div>
            </a>

            <a href="poslugy/other.html" class="category-card">
                <div class="card-icon">✨</div>
                <div class="card-text">Інше</div>
            </a>

        </div>
    </div>

    <script>
        // Завантаження даних користувача з пам'яті браузера
        document.addEventListener('DOMContentLoaded', () => {
            const savedData = localStorage.getItem('userAccount');
            if (savedData) {
                const user = JSON.parse(savedData);
                document.getElementById('user-name').innerText = user.name;
                document.getElementById('user-email').innerText = user.email;
            }
        });

        // Відкриття/Закриття профілю
        function toggleProfile() {
            const menu = document.getElementById('profileMenu');
            const overlay = document.getElementById('click-outside');
            
            if (menu.classList.contains('active')) {
                menu.classList.remove('active');
                overlay.style.display = 'none';
            } else {
                menu.classList.add('active');
                overlay.style.display = 'block';
            }
        }
    </script>
</body>
</html>
