<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Відновлення пароля</title>
    <style>
        :root {
            --primary-blue: #005AEE;
            --primary-blue-hover: #0045B8;
            --bg-white: #FFFFFF;
            --text-dark: #111827;
            --text-light: #6B7280;
            --border-color: #E5E7EB;
            --input-bg: #F9FAFB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #F3F4F6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            background-color: var(--bg-white);
            width: 100%;
            max-width: 400px;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
        }

        @media (min-width: 401px) {
            .app-container {
                min-height: 800px;
                border-radius: 24px;
            }
        }

        /* Сповіщення */
        .toast {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: white;
            padding: 14px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 4px solid var(--primary-blue);
            width: max-content;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { border-left-color: #EF4444; }

        h1 { font-size: 26px; font-weight: 700; color: var(--text-dark); margin-bottom: 12px; }
        p.subtitle { color: var(--text-light); font-size: 15px; margin-bottom: 32px; line-height: 1.4; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px; }
        .form-group input { 
            width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--border-color); 
            background-color: var(--input-bg); font-size: 16px; transition: 0.2s;
        }
        .form-group input:focus { outline: none; border-color: var(--primary-blue); background: white; }

        .btn { 
            width: 100%; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600; 
            cursor: pointer; border: none; transition: 0.2s; margin-top: 10px;
        }
        .btn-primary { background: var(--primary-blue); color: white; }
        .btn-primary:active { transform: scale(0.98); }

        /* Секції */
        #reset-section { display: none; margin-top: 20px; border-top: 1px solid var(--border-color); pt: 20px; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .back-link { 
            display: block; text-align: center; margin-top: 24px; color: var(--text-light); 
            text-decoration: none; font-size: 14px; font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="toast" class="toast">Повідомлення</div>

        <h1>Відновлення</h1>
        <p class="subtitle">Введіть ваші дані, щоб ми могли підтвердити вашу особу та змінити пароль.</p>

        <div id="verify-section">
            <div class="form-group">
                <label>Ваша пошта</label>
                <input type="email" id="verify-email" placeholder="example@mail.com">
            </div>
            <div class="form-group">
                <label>Ваше ім'я</label>
                <input type="text" id="verify-name" placeholder="Ім'я">
            </div>
            <button class="btn btn-primary" onclick="handleVerify()">Перевірити дані</button>
        </div>

        <div id="reset-section" class="fade-in">
            <h1 style="margin-top: 20px; font-size: 22px;">Новий пароль</h1>
            <p class="subtitle" style="margin-bottom: 20px;">Тепер ви можете встановити новий пароль для входу.</p>
            
            <div class="form-group">
                <label>Введіть новий пароль</label>
                <input type="password" id="new-password" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Підтвердіть пароль</label>
                <input type="password" id="confirm-password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="handleReset()">Підтвердити</button>
        </div>

        <a href="vitalik.html" class="back-link">Повернутися у меню</a>
    </div>

    <script>
        function showToast(text, isError = false) {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.className = isError ? 'toast show error' : 'toast show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Перевірка особи
        function handleVerify() {
            const email = document.getElementById('verify-email').value;
            const name = document.getElementById('verify-name').value;
            const savedData = localStorage.getItem('userAccount');

            if (!savedData) {
                showToast("Користувача не знайдено", true);
                return;
            }

            const user = JSON.parse(savedData);

            if (user.email === email && user.name === name) {
                showToast("Дані підтверджено!");
                document.getElementById('verify-section').style.display = 'none';
                document.getElementById('reset-section').style.display = 'block';
            } else {
                showToast("Ім'я або пошта не співпадають", true);
            }
        }

        // Оновлення пароля
        function handleReset() {
            const pass1 = document.getElementById('new-password').value;
            const pass2 = document.getElementById('confirm-password').value;

            if (pass1.length < 4) {
                showToast("Надто короткий пароль", true);
                return;
            }

            if (pass1 !== pass2) {
                showToast("Паролі не співпадають", true);
                return;
            }

            // Отримуємо поточні дані, міняємо пароль і зберігаємо назад
            const savedData = JSON.parse(localStorage.getItem('userAccount'));
            savedData.password = pass1;
            localStorage.setItem('userAccount', JSON.stringify(savedData));

            showToast("Пароль змінено! Перенаправлення...");

            // Перенаправляємо на вхід з параметром, щоб очистити поля
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        }
    </script>
</body>
</html>
