<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikles — Розробка веб-сайту</title>
    <style>
        :root {
            --primary-blue: #005AEE;
            --primary-blue-hover: #0045B8;
            --bg-white: #FFFFFF;
            --text-dark: #111827;
            --text-light: #6B7280;
            --border-color: #E5E7EB;
            --input-bg: #F9FAFB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #F3F4F6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            background-color: var(--bg-white);
            width: 100%;
            max-width: 400px;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding-bottom: 30px;
        }

        @media (min-width: 401px) {
            .app-container {
                min-height: 800px;
                border-radius: 24px;
                margin: 20px 0;
            }
        }

        header {
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-dark);
            cursor: pointer;
            margin-right: 16px;
            display: flex;
            align-items: center;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .content { padding: 24px; }

        .intro-text { margin-bottom: 24px; }
        .intro-text h1 { font-size: 24px; color: var(--text-dark); margin-bottom: 6px; }
        .intro-text p { font-size: 14px; color: var(--text-light); line-height: 1.5; }

        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            font-size: 13px; 
            font-weight: 600; 
            color: var(--text-dark); 
            margin-bottom: 8px; 
        }

        .custom-input, .custom-select, textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            font-size: 15px;
            color: var(--text-dark);
            transition: 0.2s;
            appearance: none;
        }

        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: '▼';
            font-size: 10px;
            color: var(--text-light);
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .custom-input:focus, .custom-select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-blue);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(0, 90, 238, 0.05);
        }

        .radio-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-option { position: relative; }
        .radio-option input { position: absolute; opacity: 0; }
        
        .radio-label {
            display: block;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .radio-option input:checked + .radio-label {
            border-color: var(--primary-blue);
            background-color: #f0f7ff;
            font-weight: 600;
        }

        .hidden-input {
            display: none;
            margin-top: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(0, 90, 238, 0.2);
            transition: 0.2s;
        }

        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: white;
            padding: 14px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 1000;
            transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            border-left: 4px solid var(--primary-blue);
            font-weight: 600;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="toast" class="toast">Анкету успішно надіслано! 🌐</div>

    <div class="app-container">
        <header>
            <button class="back-btn" onclick="location.href='../../vitalik.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <div class="header-title">Анкета на веб-сайт</div>
        </header>

        <div class="content">
            <div class="intro-text">
                <h1>Твій проект в мережі 🌐</h1>
                <p>Заповни бриф для створення веб-сайту. Розкажи детальніше про ідею, щоб ми змогли підібрати ідеальний дизайн та функціонал.</p>
            </div>

            <form id="site-form">
                
                <div class="form-group">
                    <label>Назва проекту або компанії</label>
                    <input type="text" id="site-name" class="custom-input" placeholder="Наприклад: Pikles Shop" required>
                </div>

                <div class="form-group">
                    <label>Тип сайту</label>
                    <div class="select-wrapper">
                        <select id="type-select" class="custom-select" required>
                            <option value="" disabled selected>Оберіть тип...</option>
                            <option value="Landing Page">Landing Page (Односторінковий)</option>
                            <option value="Сайт-візитка">Сайт-візитка</option>
                            <option value="Інтернет-магазин">Інтернет-магазин</option>
                            <option value="Корпоративний портал">Корпоративний багатосторінковий</option>
                            <option value="Веб-додаток (Web App)">Веб-додаток (Web App)</option>
                            <option value="Інше">Інше</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Суть проекту (до 1000 символів)</label>
                    <textarea id="essence" rows="6" maxlength="1000" class="custom-input" placeholder="Чим ліпше пояснити, тим більша гарантія на топ проект. Опишіть головний функціонал, структуру та побажання..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Кошти</label>
                    <div class="radio-stack">
                        <label class="radio-option">
                            <input type="radio" name="budget" value="developer" checked onchange="toggleBudget(this)">
                            <div class="radio-label">На розгляд розробника</div>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="budget" value="custom" onchange="toggleBudget(this)">
                            <div class="radio-label">Вказати свою суму</div>
                        </label>
                        <input type="number" id="budget-manual" class="custom-input hidden-input" placeholder="Сума в грн (наприклад: 5000)">
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="btn-submit">Надіслати</button>

            </form>
        </div>
    </div>

    <script>
        function toggleBudget(radio) {
            const manualInput = document.getElementById('budget-manual');
            if (radio.value === 'custom') {
                manualInput.style.display = 'block';
                manualInput.required = true;
            } else {
                manualInput.style.display = 'none';
                manualInput.required = false;
                manualInput.value = '';
            }
        }

        document.getElementById('site-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            
            const BOT_TOKEN = "8772032690:AAEa4MUdtUmiwEOPAIwpkkow9_I7-eudNrU";
            // Твій новий ID для отримання заявок
            const CHAT_ID = "2106920885";

            const siteName = document.getElementById('site-name').value.trim();
            const siteType = document.getElementById('type-select').value;
            const essence = document.getElementById('essence').value.trim();
            
            const budgetType = document.querySelector('input[name="budget"]:checked').value;
            let budget = "На розгляд розробника";
            if (budgetType === "custom") {
                budget = document.getElementById('budget-manual').value + " грн";
            }

            const message = `Новий тікет! [Послуги розробки]\n\n` +
                            `Тип: Веб-сайт\n` +
                            `Назва сайту: ${siteName}\n` +
                            `Тип сайту: ${siteType}\n` +
                            `Суть: ${essence}\n` +
                            `Кошти: ${budget}\n\n` +
                            `telegram клієнта: @Vitalik_3331`;

            btn.disabled = true;
            btn.innerText = "Відправка...";

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: message })
                });

                if (response.ok) {
                    document.getElementById('toast').classList.add('show');
                    setTimeout(() => { window.location.href = '../../vitalik.html'; }, 2000);
                } else {
                    alert('Помилка при відправці!');
                    btn.disabled = false;
                    btn.innerText = "Надіслати";
                }
            } catch (err) {
                alert('З’єднання з ботом розірвано');
                btn.disabled = false;
                btn.innerText = "Надіслати";
            }
        });
    </script>
</body>
</html>
