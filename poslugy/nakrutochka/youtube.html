<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikles — Накрутка YouTube</title>
    <style>
        :root {
            --primary-blue: #005AEE;
            --bg-white: #FFFFFF;
            --text-dark: #111827;
            --text-light: #6B7280;
            --border-color: #E5E7EB;
            --input-bg: #F9FAFB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #F3F4F6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            background-color: var(--bg-white);
            width: 100%;
            max-width: 400px;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding-bottom: 30px;
        }

        @media (min-width: 401px) {
            .app-container {
                min-height: 800px;
                border-radius: 24px;
                margin: 20px 0;
            }
        }

        header {
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-dark);
            cursor: pointer;
            margin-right: 16px;
            display: flex;
            align-items: center;
        }

        .header-title { font-size: 18px; font-weight: 700; }

        .content { padding: 24px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            font-size: 13px; 
            font-weight: 700; 
            color: var(--text-dark); 
            margin-bottom: 8px; 
        }

        .custom-input, .custom-select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        .custom-input:focus { border-color: var(--primary-blue); background: white; }

        .price-tag {
            background: #FFF1F2; /* Світло-червоний відтінок YouTube */
            color: #DC2626;
            padding: 16px;
            border-radius: 14px;
            text-align: center;
            font-weight: 800;
            font-size: 22px;
            margin: 24px 0;
            border: 1px solid rgba(220, 38, 38, 0.1);
        }

        .hidden { display: none; }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #DC2626; /* YouTube Red */
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: white; padding: 14px 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 1000;
            transition: 0.4s; border-left: 4px solid #DC2626; font-weight: 600;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="toast" class="toast">Замовлення YouTube додано! 📺</div>

    <div class="app-container">
        <header>
            <button class="back-btn" onclick="location.href='../../vitalik.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <div class="header-title">Накрутка YouTube</div>
        </header>

        <div class="content">
            <form id="yt-form">
                
                <div class="form-group">
                    <label>Оберіть послугу</label>
                    <select id="main-service" class="custom-select" onchange="updateUI()">
                        <option value="views">Перегляди (159 грн / 1000 шт)</option>
                        <option value="subs">Підписники</option>
                        <option value="likes">Лайки (25 грн / 100 шт)</option>
                        <option value="comments">Коментарі (90 грн / 10 шт)</option>
                    </select>
                </div>

                <div id="subs-type-block" class="form-group hidden">
                    <label>Тариф підписників</label>
                    <select id="subs-type" class="custom-select" onchange="calculatePrice()">
                        <option value="small" data-price="225" data-base="100">від 100 шт (225 грн / 100)</option>
                        <option value="large" data-price="2550" data-base="1000">від 1000 шт (2550 грн / 1000)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Посилання на відео або канал</label>
                    <input type="text" id="yt-link" class="custom-input" placeholder="https://www.youtube.com/..." required>
                </div>

                <div class="form-group">
                    <label id="qty-label">Кількість</label>
                    <input type="number" id="qty" class="custom-input" value="1000" min="1" oninput="calculatePrice()">
                </div>

                <div class="price-tag">
                    Разом: <span id="total-price">159.00</span> грн
                </div>

                <button type="submit" id="submit-btn" class="btn-submit">Оформити замовлення</button>
            </form>
        </div>
    </div>

    <script>
        function updateUI() {
            const service = document.getElementById('main-service').value;
            const subsBlock = document.getElementById('subs-type-block');
            const qtyInput = document.getElementById('qty');
            const label = document.getElementById('qty-label');

            // Показуємо блок тарифів тільки для підписників
            subsBlock.classList.toggle('hidden', service !== 'subs');

            // Коригуємо значення за замовчуванням
            if (service === 'views') {
                qtyInput.value = 1000;
                label.innerText = "Кількість (кратність 1000)";
            } else if (service === 'subs') {
                qtyInput.value = 100;
                label.innerText = "Кількість";
            } else if (service === 'likes') {
                qtyInput.value = 100;
                label.innerText = "Кількість (кратність 100)";
            } else if (service === 'comments') {
                qtyInput.value = 10;
                label.innerText = "Кількість (кратність 10)";
            }

            calculatePrice();
        }

        function calculatePrice() {
            const service = document.getElementById('main-service').value;
            const qty = parseFloat(document.getElementById('qty').value) || 0;
            let total = 0;

            if (service === 'views') {
                total = (qty / 1000) * 159;
            } else if (service === 'subs') {
                const opt = document.getElementById('subs-type').selectedOptions[0];
                const price = parseFloat(opt.getAttribute('data-price'));
                const base = parseFloat(opt.getAttribute('data-base'));
                total = (qty / base) * price;
            } else if (service === 'likes') {
                total = (qty / 100) * 25;
            } else if (service === 'comments') {
                total = (qty / 10) * 90;
            }

            document.getElementById('total-price').innerText = total.toFixed(2);
        }

        document.getElementById('yt-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            
            const serviceText = document.getElementById('main-service').selectedOptions[0].text;
            const qty = document.getElementById('qty').value;
            const price = document.getElementById('total-price').innerText;
            const link = document.getElementById('yt-link').value;
            
            const message = `Новий тікет! [Послуги накрутки]\n\n` +
                            `Платформа: YouTube\n` +
                            `Послуга: ${serviceText}\n` +
                            `Кількість: ${qty} шт\n` +
                            `Сума: ${price} грн\n` +
                            `Посилання: ${link}\n\n` +
                            `telegram клієнта: @Vitalik_3331`;

            btn.disabled = true;
            btn.innerText = "Надсилаємо...";

            try {
                await fetch(`https://api.telegram.org/bot8772032690:AAEa4MUdtUmiwEOPAIwpkkow9_I7-eudNrU/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: "2106920885", text: message })
                });
                document.getElementById('toast').classList.add('show');
                setTimeout(() => { window.location.href = '../../vitalik.html'; }, 2000);
            } catch (err) {
                alert('Помилка відправки');
                btn.disabled = false;
            }
        });

        // Початковий розрахунок
        updateUI();
    </script>
</body>
</html>
