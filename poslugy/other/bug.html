<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikles — Зворотний зв'язок</title>
    <style>
        :root {
            --primary-blue: #005AEE;
            --bg-white: #FFFFFF;
            --text-dark: #111827;
            --text-light: #6B7280;
            --border-color: #E5E7EB;
            --input-bg: #F9FAFB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #F3F4F6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            background-color: var(--bg-white);
            width: 100%;
            max-width: 400px;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding-bottom: 30px;
        }

        @media (min-width: 401px) {
            .app-container {
                min-height: 800px;
                border-radius: 24px;
                margin: 20px 0;
            }
        }

        header {
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-dark);
            cursor: pointer;
            margin-right: 16px;
            display: flex;
            align-items: center;
        }

        .header-title { font-size: 18px; font-weight: 700; }

        .content { padding: 24px; }

        .intro-text { margin-bottom: 24px; }
        .intro-text h1 { font-size: 24px; color: var(--text-dark); margin-bottom: 6px; }
        .intro-text p { font-size: 14px; color: var(--text-light); line-height: 1.5; }

        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            font-size: 13px; 
            font-weight: 700; 
            color: var(--text-dark); 
            margin-bottom: 8px; 
        }

        .custom-input, .custom-select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        .custom-input:focus { border-color: var(--primary-blue); background: white; }

        textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            font-size: 15px;
            resize: none;
            min-height: 180px;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: white; padding: 14px 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 1000;
            transition: 0.4s; border-left: 4px solid var(--primary-blue); font-weight: 600;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="toast" class="toast">Повідомлення надіслано! 👋</div>

    <div class="app-container">
        <header>
            <button class="back-btn" onclick="location.href='../../vitalik.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <div class="header-title">Підтримка та зв'язок</div>
        </header>

        <div class="content">
            <div class="intro-text">
                <h1>Напишіть нам 📬</h1>
                <p>Маєте ідею, знайшли помилку чи хочете співпрацювати? Ми завжди відкриті до спілкування.</p>
            </div>

            <form id="support-form">
                
                <div class="form-group">
                    <label>Тема звернення</label>
                    <select id="category" class="custom-select" required>
                        <option value="Коригування">Запропонувати коригування</option>
                        <option value="Відгук">Відгуки та побажання</option>
                        <option value="Співпраця">Співпраця та реклама</option>
                        <option value="Помилка">Повідомити про помилку</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Ваше повідомлення</label>
                    <textarea id="message-text" placeholder="Опишіть детально вашу ситуацію або пропозицію..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Ваш Telegram для зв'язку</label>
                    <input type="text" id="contact" class="custom-input" placeholder="@username" required>
                </div>

                <button type="submit" id="submit-btn" class="btn-submit">Надіслати повідомлення</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('support-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            
            const category = document.getElementById('category').value;
            const text = document.getElementById('message-text').value;
            const contact = document.getElementById('contact').value;

            const message = `⚡ НОВЕ ПОВІДОМЛЕННЯ [ПІДТРИМКА]\n\n` +
                            `Тема: ${category}\n` +
                            `Текст: ${text}\n\n` +
                            `Контакт клієнта: ${contact}`;

            btn.disabled = true;
            btn.innerText = "Надсилаємо...";

            try {
                await fetch(`https://api.telegram.org/bot8772032690:AAEa4MUdtUmiwEOPAIwpkkow9_I7-eudNrU/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: "2106920885", text: message })
                });
                
                document.getElementById('toast').classList.add('show');
                setTimeout(() => { window.location.href = '../../vitalik.html'; }, 2000);
            } catch (err) {
                alert('Сталася помилка. Спробуйте ще раз.');
                btn.disabled = false;
                btn.innerText = "Надіслати повідомлення";
            }
        });
    </script>
</body>
</html>
