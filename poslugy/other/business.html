<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikles — Технічні роботи</title>
    <style>
        :root {
            --primary-blue: #005AEE;
            --bg-white: #FFFFFF;
            --text-dark: #111827;
            --text-light: #6B7280;
            --border-color: #E5E7EB;
            --input-bg: #F9FAFB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #F3F4F6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            background-color: var(--bg-white);
            width: 100%;
            max-width: 400px;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px 24px;
            text-align: center;
        }

        @media (min-width: 401px) {
            .app-container {
                min-height: 800px;
                border-radius: 24px;
                margin: 20px 0;
            }
        }

        /* Кнопка назад у верхньому куті */
        .back-nav {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .back-btn {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-dark);
            cursor: pointer;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .back-btn:active { transform: scale(0.9); }

        /* Анімація іконки */
        .status-icon {
            width: 100px;
            height: 100px;
            background-color: #eff6ff;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            margin-bottom: 24px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 90, 238, 0.2); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(0, 90, 238, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 90, 238, 0); }
        }

        h1 {
            font-size: 24px;
            color: var(--text-dark);
            margin-bottom: 12px;
            font-weight: 800;
        }

        p {
            font-size: 15px;
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .loader-bar {
            width: 100%;
            height: 8px;
            background-color: var(--input-bg);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .loader-fill {
            width: 99%;
            height: 100%;
            background-color: var(--primary-blue);
            border-radius: 10px;
            animation: loading 3s ease-in-out infinite;
        }

        @keyframes loading {
            0% { width: 10%; }
            50% { width: 85%; }
            100% { width: 10%; }
        }

        .status-text {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-home {
            margin-top: 40px;
            padding: 16px 32px;
            background-color: var(--text-dark);
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 15px;
            transition: opacity 0.2s;
        }

        .btn-home:active { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="back-nav">
            <button class="back-btn" onclick="location.href='../../vitalik.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
        </div>

        <div class="status-icon">🛠️</div>
        
        <h1>Розділ у розробці</h1>
        <p>Ми саме зараз працюємо над цим функціоналом, щоб все літало. Заходь сюди завтра — все буде готово!</p>

        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>
        <span class="status-text">Завантаження 99%</span>

        <a href="../../vitalik.html" class="btn-home">Повернутися на головну</a>
    </div>

</body>
</html>
