<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikles — Накрутка</title>
    <style>
        :root {
            --primary-blue: #005AEE;
            --bg-white: #FFFFFF;
            --text-dark: #111827;
            --text-light: #6B7280;
            --border-color: #E5E7EB;
            --input-bg: #F9FAFB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #F3F4F6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            background-color: var(--bg-white);
            width: 100%;
            max-width: 400px;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        @media (min-width: 401px) {
            .app-container {
                min-height: 800px;
                border-radius: 24px;
                margin: 20px 0;
                overflow: hidden;
            }
        }

        header {
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-dark);
            cursor: pointer;
            margin-right: 16px;
            display: flex;
            align-items: center;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
        }

        .hero-section {
            padding: 32px 24px 10px 24px;
        }

        .hero-section h1 {
            font-size: 26px;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .hero-section p {
            font-size: 15px;
            color: var(--text-light);
            line-height: 1.5;
        }

        .social-list {
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .social-card {
            background-color: var(--bg-white);
            border: 1px solid var(--border-color);
            padding: 18px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s, background-color 0.2s;
        }

        .social-card:active {
            transform: scale(0.97);
            background-color: var(--input-bg);
        }

        .icon-wrap {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 16px;
            font-size: 20px;
            color: white;
        }

        .name-wrap { flex-grow: 1; }
        .name-wrap span { display: block; font-weight: 700; color: var(--text-dark); font-size: 16px; }
        .name-wrap small { color: var(--text-light); font-size: 12px; }

        /* Кольори брендів */
        .tiktok { background: linear-gradient(45deg, #000, #25F4EE, #FE2C55); }
        .telegram { background: #0088cc; }
        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .youtube { background: #FF0000; }

        .arrow { color: var(--primary-blue); font-weight: bold; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <button class="back-btn" onclick="location.href='../vitalik.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <div class="header-title">Накрутка</div>
        </header>

        <div class="hero-section">
            <h1>Будь в топі 🚀</h1>
            <p>Обирай соціальну мережу та прокачуй свій профіль новими підписниками, лайками та переглядами вже зараз.</p>
        </div>

        <div class="social-list">
            
            <a href="nakrutochka/tiktok.html" class="social-card">
                <div class="icon-wrap tiktok">📱</div>
                <div class="name-wrap">
                    <span>Tik-Tok</span>
                    <small>Перегляди, лайки, фанати</small>
                </div>
                <span class="arrow">→</span>
            </a>

            <a href="nakrutochka/telegram.html" class="social-card">
                <div class="icon-wrap telegram">✈️</div>
                <div class="name-wrap">
                    <span>Telegram</span>
                    <small>Підписники, реакції, охоплення</small>
                </div>
                <span class="arrow">→</span>
            </a>

            <a href="nakrutochka/instagram.html" class="social-card">
                <div class="icon-wrap instagram">📸</div>
                <div class="name-wrap">
                    <span>Instagram</span>
                    <small>Жива аудиторія, Reels, Stories</small>
                </div>
                <span class="arrow">→</span>
            </a>

            <a href="nakrutochka/youtube.html" class="social-card">
                <div class="icon-wrap youtube">▶️</div>
                <div class="name-wrap">
                    <span>Youtube</span>
                    <small>Години перегляду, саби, актив</small>
                </div>
                <span class="arrow">→</span>
            </a>

        </div>
    </div>

</body>
</html>
