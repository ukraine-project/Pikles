<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikles — Футбол</title>
    <style>
        :root {
            --primary-blue: #005AEE;
            --primary-blue-hover: #0045B8;
            --bg-white: #FFFFFF;
            --text-dark: #111827;
            --text-light: #6B7280;
            --border-color: #E5E7EB;
            --input-bg: #F9FAFB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #F3F4F6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            background-color: var(--bg-white);
            width: 100%;
            max-width: 400px;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding-bottom: 30px;
        }

        @media (min-width: 401px) {
            .app-container {
                min-height: 800px;
                border-radius: 24px;
                margin: 20px 0;
            }
        }

        header {
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-dark);
            cursor: pointer;
            margin-right: 16px;
            display: flex;
            align-items: center;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .content { padding: 24px; }

        .intro-text { margin-bottom: 24px; }
        .intro-text h1 { font-size: 24px; color: var(--text-dark); margin-bottom: 6px; }
        .intro-text p { font-size: 14px; color: var(--text-light); }

        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            font-size: 13px; 
            font-weight: 600; 
            color: var(--text-dark); 
            margin-bottom: 8px; 
        }
        
        .label-status {
            font-weight: 400;
            font-size: 11px;
            margin-left: 4px;
        }
        .required { color: #EF4444; }
        .optional { color: var(--text-light); }

        .custom-input, .custom-select, textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            font-size: 15px;
            color: var(--text-dark);
            transition: 0.2s;
        }

        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: '▼';
            font-size: 10px;
            color: var(--text-light);
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .custom-input:focus, .custom-select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-blue);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(0, 90, 238, 0.05);
        }

        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .chip {
            padding: 8px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .chip.active {
            background-color: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }

        .hidden-input {
            display: none;
            margin-top: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-submit:disabled { opacity: 0.6; }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: white;
            padding: 14px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 1000;
            transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            border-left: 4px solid var(--primary-blue);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="toast" class="toast">Заявку надіслано! ⚽</div>

    <div class="app-container">
        <header>
            <button class="back-btn" onclick="location.href='../vitalik.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <div class="header-title">Анкета матчу</div>
        </header>

        <div class="content">
            <div class="intro-text">
                <h1>Налаштування гри</h1>
                <p>Заповніть деталі майбутньої зустрічі.</p>
            </div>

            <form id="football-form">
                
                <div class="form-group">
                    <label>Час гри <span class="label-status required">*обов'язково</span></label>
                    <input type="time" id="match-time" class="custom-input" required>
                </div>

                <div class="form-group">
                    <label>Хто буде? <span class="label-status optional">*необов'язково</span></label>
                    <div class="chips-container">
                        <div class="chip" onclick="toggleChip(this, 'Святослав')">Святослав</div>
                        <div class="chip" onclick="toggleChip(this, 'Богдан')">Богдан</div>
                        <div class="chip" onclick="toggleOtherInput(this)">Інше</div>
                    </div>
                    <input type="text" id="other-people-manual" class="custom-input hidden-input" placeholder="Введіть імена через кому">
                </div>

                <div class="form-group">
                    <label>Стадіон <span class="label-status required">*обов'язково</span></label>
                    <div class="select-wrapper">
                        <select id="stadium-select" class="custom-select" required onchange="checkManual(this, 'stadium-manual')">
                            <option value="" disabled selected>Оберіть стадіон...</option>
                            <option value="Протасевича 4">Протасевича 4</option>
                            <option value="ТНВК ШМЛ №15">ТНВК ШМЛ №15</option>
                            <option value="Протасевича 6">Протасевича 6</option>
                            <option value="other">Інший (вписати)</option>
                        </select>
                    </div>
                    <input type="text" id="stadium-manual" class="custom-input hidden-input" placeholder="Назва стадіону">
                </div>

                <div class="form-group">
                    <label>Місце зустрічі <span class="label-status required">*обов'язково</span></label>
                    <div class="select-wrapper">
                        <select id="meeting-select" class="custom-select" required onchange="checkManual(this, 'meeting-manual')">
                            <option value="" disabled selected>Оберіть місце...</option>
                            <option value="Підїзд №1. Лесі Українки 13.">Підїзд №1. Лесі Українки 13.</option>
                            <option value="ТНВК ШМЛ №15">ТНВК ШМЛ №15</option>
                            <option value="other">Інше (вписати)</option>
                        </select>
                    </div>
                    <input type="text" id="meeting-manual" class="custom-input hidden-input" placeholder="Місце зустрічі">
                </div>

                <div class="form-group">
                    <label>Додатково <span class="label-status optional">*необов'язково</span></label>
                    <textarea id="extra-info" rows="3" maxlength="500" placeholder="Ваші коментарі..."></textarea>
                </div>

                <button type="submit" id="submit-btn" class="btn-submit">Надіслати</button>

            </form>
        </div>
    </div>

    <script>
        let selectedChips = [];

        function toggleChip(el, name) {
            el.classList.toggle('active');
            if(el.classList.contains('active')) {
                selectedChips.push(name);
            } else {
                selectedChips = selectedChips.filter(i => i !== name);
            }
        }

        function toggleOtherInput(el) {
            el.classList.toggle('active');
            document.getElementById('other-people-manual').style.display = el.classList.contains('active') ? 'block' : 'none';
        }

        function checkManual(select, manualId) {
            const input = document.getElementById(manualId);
            if (select.value === 'other') {
                input.style.display = 'block';
                input.required = true;
            } else {
                input.style.display = 'none';
                input.required = false;
            }
        }

        document.getElementById('football-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            
            // ДАНІ ТЕЛЕГРАМ
            const BOT_TOKEN = "8772032690:AAEa4MUdtUmiwEOPAIwpkkow9_I7-eudNrU";
            const CHAT_ID = "2106920885";

            // Формування списку людей
            let peopleList = "Віталік, Рома";
            if (selectedChips.length > 0) {
                peopleList += ", " + selectedChips.join(", ");
            }
            const manualPeople = document.getElementById('other-people-manual').value;
            if (manualPeople) {
                peopleList += ", " + manualPeople;
            }

            // Отримання значень стадіону та зустрічі
            const stadium = document.getElementById('stadium-select').value === 'other' ? 
                            document.getElementById('stadium-manual').value : 
                            document.getElementById('stadium-select').value;
            
            const meeting = document.getElementById('meeting-select').value === 'other' ? 
                            document.getElementById('meeting-manual').value : 
                            document.getElementById('meeting-select').value;

            const extra = document.getElementById('extra-info').value.trim() || "-";

            const message = `Новий тікет! [Послуги футболу]\n\n` +
                            `Час: ${document.getElementById('match-time').value}\n` +
                            `Хто буде: ${peopleList}\n` +
                            `Стадіон: ${stadium}\n` +
                            `Місце зустрічі: ${meeting}\n` +
                            `Додатково: ${extra}\n\n` +
                            `telegram клієнта: @Vitalik_3331`;

            btn.disabled = true;
            btn.innerText = "Відправка...";

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: message })
                });

                if (response.ok) {
                    document.getElementById('toast').classList.add('show');
                    setTimeout(() => { window.location.href = '../vitalik.html'; }, 2000);
                } else {
                    alert('Помилка при відправці!');
                    btn.disabled = false;
                    btn.innerText = "Надіслати";
                }
            } catch (err) {
                alert('З’єднання з ботом розірвано');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
